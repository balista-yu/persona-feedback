name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Validate persona/feedback schemas
        run: npm run validate

      - name: Aggregate sample run (smoke)
        run: |
          node plugins/persona-feedback/skills/persona-tester/scripts/aggregate.mjs \
            --feedbacks examples/runs/sample-run/raw \
            --output /tmp/smoke-report.md \
            --format both
          test -s /tmp/smoke-report.md
          test -s /tmp/smoke-report.json
          echo "smoke report ok"

      - name: Validate plugin manifests (JSON syntax)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugins/persona-feedback/.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('plugins/persona-feedback/.mcp.json','utf8'))"
