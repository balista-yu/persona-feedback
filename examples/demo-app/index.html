<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- 意図的に viewport 指定なし: モバイルで読みづらくなる（gal-20s が反応するはず） -->
<title>PhotoShare β</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>PhotoShare</h1>
    <nav>
      <!-- アイコンのみのボタン（tanaka-60s が反応するはず） -->
      <button id="menu" aria-label="">☰</button>
      <button id="profile" aria-label="">👤</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <!-- 専門用語ばかりのコピー（tanaka-60s 用） -->
      <h2>クラウドネイティブな OAuth 認証で、シームレスにアセットをアップロードしましょう。</h2>
      <p class="lead">最先端の AI レコメンデーションエンジンが、あなたのコンテンツを最適化します。</p>
      <button class="cta" id="start">Get Started</button>
    </section>

    <section class="signup" hidden id="signup">
      <h3>サインアップ</h3>
      <form id="signup-form">
        <!-- 入力欄が小さすぎる（gal-20s 用） -->
        <label>メールアドレス
          <input type="email" required>
        </label>
        <label>パスワード
          <input type="password" required minlength="12">
        </label>
        <label>パスワード（確認）
          <input type="password" required minlength="12">
        </label>
        <label>電話番号
          <input type="tel">
        </label>
        <label>住所
          <input type="text">
        </label>
        <label>クレジットカード番号
          <input type="text" inputmode="numeric">
        </label>
        <!-- プライバシーポリシーへのリンクが目立たない（dev-engineer 用） -->
        <p class="fine-print">サインアップすることで <a href="#">規約</a> に同意したものとみなします。</p>
        <button type="submit">登録</button>
      </form>
    </section>

    <section class="thanks" hidden id="thanks">
      <h3>登録完了</h3>
      <!-- エラー時のメッセージが不親切（共通） -->
      <p id="result"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
